<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>デジタル朝礼ボード v0.7</title>
    <link rel="stylesheet" href="./styles.css?v=0.7" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>デジタル朝礼ボード v0.7</h1>
        <p>整備工場 作業カード v0.7</p>
      </div>
      <div class="topbar-actions">
        <div class="topbar-management-actions">
          <button id="history-button" class="secondary-button" type="button">完了履歴</button>
          <button id="members-button" class="secondary-button" type="button">メンバー設定</button>
        </div>
        <div class="topbar-add-actions">
          <button id="add-card-button" class="primary-button" type="button">＋ 案件追加</button>
        </div>
      </div>
    </header>

    <nav id="mobile-tabs" class="mobile-tabs" aria-label="担当者タブ"></nav>

    <main class="board-shell" aria-label="担当者別作業ボード">
      <aside id="complete-drop-zone" class="complete-drop-zone" aria-label="完了ボックス">
        完了ボックス
        <span>ここにカードを移動</span>
      </aside>
      <section id="board" class="board"></section>
      <section id="mobile-list" class="mobile-list" aria-live="polite"></section>
    </main>

    <dialog id="card-dialog" class="card-dialog">
      <form id="card-form" method="dialog">
        <div class="dialog-head">
          <h2 id="dialog-title">案件カード</h2>
          <button class="icon-button" type="button" id="close-dialog-button" aria-label="閉じる">×</button>
        </div>

        <section class="image-import" aria-labelledby="image-import-title">
          <div class="workflow-step-heading">
            <span class="step-number">1</span>
            <strong id="image-import-title">写真を選ぶ</strong>
          </div>
          <div id="image-drop-zone" class="image-drop-zone">
            <div id="image-empty-state" class="image-empty-state">
              <span class="drop-hint">画像をここにドラッグ＆ドロップ</span>
              <div class="image-input-actions">
                <label class="secondary-button camera-input-button" for="camera-input">写真を撮る</label>
                <label class="secondary-button gallery-input-button" for="gallery-input">
                  <span class="desktop-label">ファイルを選択</span>
                  <span class="mobile-label">写真を選択</span>
                </label>
              </div>
            </div>
            <div id="image-preview-state" class="image-preview-state" hidden>
              <button id="image-preview-button" class="image-preview-button" type="button" aria-label="画像を拡大表示">
                <img id="image-thumbnail" alt="案件写真のプレビュー" />
              </button>
              <div class="image-preview-info">
                <strong>案件写真</strong>
                <span>画像を押すと拡大できます</span>
                <button id="remove-image-button" class="danger-button" type="button">画像を削除</button>
              </div>
            </div>
          </div>
          <input id="camera-input" class="visually-hidden" type="file" accept="image/*" capture="environment" />
          <input id="gallery-input" class="visually-hidden" type="file" accept="image/*" />
          <div class="ocr-control-row">
            <span class="step-number">2</span>
            <button id="ocr-button" class="secondary-button" type="button" disabled>文字を読み取る</button>
            <div id="ocr-loading" class="ocr-loading" role="status" aria-live="polite" hidden>
              <span class="loading-spinner" aria-hidden="true"></span>
              <span id="ocr-progress-text">読み取り準備中...</span>
            </div>
          </div>
          <div id="ocr-feedback" class="ocr-feedback" hidden>
            <p id="ocr-result-note">候補をフォームへ反映しました。内容を確認し、必要に応じて修正してください。</p>
            <button
              id="ocr-result-toggle"
              class="text-button"
              type="button"
              aria-expanded="false"
              aria-controls="ocr-result-panel"
            >読み取り結果を表示</button>
          </div>
          <div id="ocr-result-panel" class="ocr-result-panel" hidden>
            <label for="ocr-result">OCR結果（全文）</label>
            <textarea id="ocr-result" rows="6" readonly></textarea>
          </div>
        </section>

        <div class="workflow-step-heading form-step-heading">
          <span class="step-number">3</span>
          <strong>内容を確認して保存</strong>
        </div>
        <div class="form-grid">
          <label>
            社名
            <input id="company-input" name="company" list="company-suggestions" autocomplete="organization" required />
            <datalist id="company-suggestions"></datalist>
          </label>
          <label>
            ナンバー下4桁
            <input id="plate-input" name="plate" inputmode="numeric" maxlength="4" required />
          </label>
          <label>
            車名
            <input id="car-input" name="car" required />
          </label>
          <label>
            作業内容
            <input id="work-input" name="work" required />
          </label>
          <label>
            顧客名
            <input id="customer-input" name="customer" list="customer-suggestions" autocomplete="name" required />
            <datalist id="customer-suggestions"></datalist>
          </label>
          <label>
            担当者
            <select id="assignee-input" name="assignee"></select>
          </label>
          <label>
            ステータス
            <select id="status-input" name="status"></select>
          </label>
        </div>

        <div class="dialog-actions">
          <button id="delete-card-button" class="danger-button" type="button">削除</button>
          <div>
            <button class="secondary-button" type="button" id="complete-card-button">完了にする</button>
            <button class="primary-button" type="submit">保存</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="image-lightbox" class="image-lightbox">
      <button class="icon-button lightbox-close-button" type="button" id="close-lightbox-button" aria-label="閉じる">×</button>
      <img id="lightbox-image" alt="案件写真の拡大表示" />
    </dialog>

    <dialog id="history-dialog" class="history-dialog">
      <form id="history-form" method="dialog">
        <div class="dialog-head">
          <h2>完了履歴</h2>
          <button class="icon-button" type="button" id="close-history-button" aria-label="閉じる">×</button>
        </div>

        <div id="history-list" class="history-list"></div>

        <div class="dialog-actions">
          <p class="dialog-note">直近30日分の完了カードを表示します。</p>
          <button class="primary-button" type="button" id="save-history-button">閉じる</button>
        </div>
      </form>
    </dialog>

    <dialog id="members-dialog" class="members-dialog">
      <form id="members-form" method="dialog">
        <div class="dialog-head">
          <h2>メンバー設定</h2>
          <button class="icon-button" type="button" id="close-members-button" aria-label="閉じる">×</button>
        </div>

        <div class="members-tools">
          <button id="add-person-button" class="secondary-button" type="button">＋ 作業者追加</button>
          <button id="seed-people-button" class="secondary-button" type="button">8人サンプルにする</button>
        </div>

        <div id="members-list" class="members-list"></div>

        <div class="dialog-actions">
          <p class="dialog-note">非表示にしても案件は残ります。</p>
          <button class="primary-button" type="button" id="save-members-button">閉じる</button>
        </div>
      </form>
    </dialog>

    <script
      src="https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js"
      onerror="this.onerror=null;this.src='https://unpkg.com/tesseract.js@7/dist/tesseract.min.js'"
    ></script>
    <script src="./app.js?v=0.7"></script>
  </body>
</html>
